services:
  - type: web
    name: voxsentinel-api
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false  # Set in Render dashboard
      - key: GROQ_API_KEY
        sync: false  # Set in Render dashboard
      - key: SUPABASE_URL
        sync: false  # Set in Render dashboard
      - key: SUPABASE_KEY
        sync: false  # Set in Render dashboard
      - key: STT_PROVIDER
        value: groq
      - key: AI_PROVIDER
        value: groq
      - key: ENVIRONMENT
        value: production
      - key: DEMO_MODE
        value: "false"

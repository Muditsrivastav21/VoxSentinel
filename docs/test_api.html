<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxSentinel API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .config-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .config-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }
        
        .config-label {
            font-weight: bold;
            color: #333;
        }
        
        .config-value {
            font-family: 'Courier New', monospace;
            color: #667eea;
        }
        
        .test-section {
            margin-bottom: 30px;
        }
        
        .test-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .test-button:active {
            transform: translateY(0);
        }
        
        .upload-section {
            border: 2px dashed #667eea;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            background: #f8f9fa;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .file-label:hover {
            background: #764ba2;
        }
        
        select {
            padding: 10px 15px;
            border-radius: 5px;
            border: 2px solid #667eea;
            font-size: 14px;
            margin: 10px 5px;
        }
        
        .result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #333;
        }
        
        .status {
            padding: 10px 20px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ VoxSentinel API Tester</h1>
        <p class="subtitle">Test your Call Center Compliance API</p>
        
        <div class="config-section">
            <h3>📡 Configuration</h3>
            <div class="config-item">
                <span class="config-label">API URL:</span>
                <span class="config-value" id="apiUrl">http://localhost:8000</span>
            </div>
            <div class="config-item">
                <span class="config-label">API Key:</span>
                <span class="config-value">sk_track3_987654321</span>
            </div>
        </div>
        
        <div class="test-section">
            <h3>🧪 Quick Tests</h3>
            <button class="test-button" onclick="testHealth()">Health Check</button>
            <button class="test-button" onclick="testStats()">Get Stats</button>
            <button class="test-button" onclick="testHistory()">Get History</button>
            <button class="test-button" onclick="testConfig()">Get Config</button>
        </div>
        
        <div class="test-section">
            <h3>🎤 Audio Analysis</h3>
            <div class="upload-section">
                <label for="audioFile" class="file-label">📁 Choose Audio File</label>
                <input type="file" id="audioFile" accept="audio/*">
                <p id="fileName" style="margin-top: 15px; color: #666;"></p>
                
                <select id="language">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Tamil">Tamil</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                </select>
                
                <button class="test-button" onclick="analyzeAudio()" style="margin-top: 15px;">
                    🚀 Analyze Call
                </button>
            </div>
        </div>
        
        <div id="status"></div>
        <div id="result"></div>
    </div>
    
    <script>
        const API_URL = 'https://voxsentinel.onrender.com';
        const API_KEY = 'sk_track3_987654321';
        
        document.getElementById('audioFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('fileName').textContent = `Selected: ${fileName}`;
        });
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        function showResult(data) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="result"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
        }
        
        function showLoader() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="loader"></div>`;
        }
        
        async function testHealth() {
            showStatus('Testing health endpoint...', 'loading');
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                showStatus(`✅ Health Check Passed (${response.status})`, 'success');
                showResult(data);
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function testStats() {
            showStatus('Fetching statistics...', 'loading');
            try {
                const response = await fetch(`${API_URL}/api/stats`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();
                showStatus(`✅ Stats Retrieved (${response.status})`, 'success');
                showResult(data);
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function testHistory() {
            showStatus('Fetching call history...', 'loading');
            try {
                const response = await fetch(`${API_URL}/api/history?limit=5`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();
                showStatus(`✅ History Retrieved (${data.total} total calls)`, 'success');
                showResult(data);
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function testConfig() {
            showStatus('Fetching configuration...', 'loading');
            try {
                const response = await fetch(`${API_URL}/api/config`);
                const data = await response.json();
                showStatus(`✅ Config Retrieved`, 'success');
                showResult(data);
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function analyzeAudio() {
            const fileInput = document.getElementById('audioFile');
            const language = document.getElementById('language').value;
            
            if (!fileInput.files[0]) {
                showStatus('❌ Please select an audio file first!', 'error');
                return;
            }
            
            showStatus('🎤 Reading audio file...', 'loading');
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                try {
                    // Convert to base64
                    const base64Audio = btoa(
                        new Uint8Array(e.target.result)
                            .reduce((data, byte) => data + String.fromCharCode(byte), '')
                    );
                    
                    showStatus(`📡 Sending to API (${language})... This may take 10-30 seconds`, 'loading');
                    showLoader();
                    
                    const response = await fetch(`${API_URL}/api/call-analytics`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': API_KEY
                        },
                        body: JSON.stringify({
                            audio: base64Audio,
                            language: language
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showStatus('✅ Analysis Complete!', 'success');
                        showResult(data);
                    } else {
                        showStatus(`❌ Error: ${data.detail || 'Unknown error'}`, 'error');
                        showResult(data);
                    }
                } catch (error) {
                    showStatus(`❌ Error: ${error.message}`, 'error');
                }
            };
            
            reader.readAsArrayBuffer(file);
        }
        
        // Test connection on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_URL}/`);
                if (response.ok) {
                    document.getElementById('apiUrl').style.color = '#28a745';
                    showStatus('🟢 Backend is online and ready!', 'success');
                }
            } catch (error) {
                document.getElementById('apiUrl').style.color = '#dc3545';
                showStatus('🔴 Backend is offline. Please start: uvicorn app:app --reload --port 8000', 'error');
            }
        });
    </script>
</body>
</html>
